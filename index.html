<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Mahmoud's Clicker</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sky"></div>

<div class="stage">
  <div class="click-label">Click</div>
  <div class="btn-row">
    <button class="notes-btn" id="notesBtn">📝</button>
    <button class="notes-btn" id="galleryBtn">🖼️</button>
  </div>
</div>

<aside class="panel" id="panel">
  <div class="panel-head">
    <h2>Mahmoud's public fan notes</h2>
    <button id="closePanel">✕</button>
  </div>
  <p class="panel-sub">Or send me a nice message at <a href="mailto:mhmudlll4xm@gmail.com">mhmudlll4xm@gmail.com</a> (actually works btw)</p>
  <input type="text" id="who" placeholder="Who are you?">
  <textarea id="msg" rows="3" placeholder="Say something nice about Mahmoud..."></textarea>
  <button class="submit-btn" id="submitNote">Submit Note</button>
  <div class="entries" id="entries"></div>
</aside>

<aside class="panel" id="galleryPanel">
  <div class="panel-head">
    <h2>Send Mahmoud your art</h2>
    <button id="closeGallery">✕</button>
  </div>
  <p class="panel-sub">Upload a photo or drawing — everyone can see what gets shared here.</p>
  <input type="text" id="artWho" placeholder="Who are you? (optional)">
  <input type="file" id="artFile" accept="image/*">
  <button class="submit-btn" id="uploadArt">Upload</button>
  <div class="upload-status" id="uploadStatus"></div>
  <div class="gallery-grid" id="galleryGrid"></div>
</aside>

<script type="module" src="script.js?v=3"></script>
</body>
</html>
